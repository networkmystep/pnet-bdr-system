<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Laporan BDR</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        /* --- STYLES UNTUK SKRIN --- */
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --success: #10b981;
            --success-hover: #059669;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --warning: #f59e0b;
            --warning-hover: #d97706;
            --bg-color: #f8fafc;
            --surface: #ffffff;
            --border: #e2e8f0;
            --text-main: #0f172a;
            --text-muted: #64748b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            line-height: 1.6;
        }
        
        .container {
            max-width: 850px;
            margin: 0 auto;
            background: var(--surface);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.01);
        }

        .login-screen { text-align: center; padding: 60px 20px; }
        .login-screen h2 { color: var(--primary); margin-bottom: 10px; }
        .login-screen input {
            padding: 12px 15px; width: 100%; max-width: 320px; margin-bottom: 20px;
            border: 1px solid var(--border); border-radius: 8px; font-size: 15px;
        }
        .login-screen input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }

        .btn {
            padding: 10px 20px; background-color: var(--primary); color: white;
            border: none; border-radius: 6px; cursor: pointer; font-size: 14px;
            font-weight: 500; margin: 4px;
        }
        .btn:hover { background-color: var(--primary-hover); }
        .btn-success { background-color: var(--success); }
        .btn-success:hover { background-color: var(--success-hover); }
        .btn-warning { background-color: var(--warning); color: white;}
        .btn-warning:hover { background-color: var(--warning-hover); }
        .btn-danger { background-color: var(--danger); }
        .btn-danger:hover { background-color: var(--danger-hover); }
        .btn-secondary { background-color: var(--text-muted); padding: 8px 16px; margin-top: 15px;}
        .btn-secondary:hover { background-color: #475569; }
        
        .report-screen { display: none; }
        
        .control-panel {
            background-color: #f1f5f9; padding: 20px; border-radius: 10px;
            border: 1px solid var(--border); margin-bottom: 30px; display: flex;
            justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;
        }
        .control-panel select { 
            padding: 10px; border-radius: 6px; border: 1px solid var(--border);
            font-family: inherit; margin-right: 10px; min-width: 180px;
        }
        
        .header-text { text-align: center; font-weight: 700; margin-bottom: 40px; line-height: 1.6; color: #1e293b; }
        
        .input-group { margin-bottom: 15px; display: flex; align-items: center; }
        .input-group label { font-weight: 600; margin-right: 15px; min-width: 150px; color: var(--text-main); }
        .input-group input { 
            flex-grow: 1; padding: 10px 12px; border: 1px solid var(--border); 
            border-radius: 6px; font-family: inherit; font-size: 14px;
        }
        .input-group input:focus, textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }
        
        table { width: 100%; border-collapse: collapse; margin-top: 25px; border-radius: 8px; overflow: hidden; }
        th, td { border: 1px solid var(--border); padding: 12px; vertical-align: top; }
        th { background-color: #f8fafc; font-weight: 600; color: var(--text-main); }
        textarea { 
            width: 100%; height: 100px; padding: 10px; border: 1px solid var(--border); 
            border-radius: 6px; font-family: inherit; font-size: 14px;
            resize: vertical; box-sizing: border-box; background-color: #fcfcfc;
        }
        
        .signature-section { 
            margin-top: 60px; text-align: center; font-weight: 500;
            page-break-inside: avoid; break-inside: avoid;
        }

        /* --- STYLES UNTUK CETAK (PRINT) --- */
        @media print {
            /* PENGUBAHSUAIAN UTAMA: Margin A4 sebenar digunakan (2cm atas/bawah/kiri/kanan) */
            @page { 
                size: A4; 
                margin: 2cm; 
            } 
            body { 
                background-color: white; 
                padding: 0 !important; /* Buang padding palsu */
                font-family: Arial, sans-serif; 
                color: black;
            }
            .container { box-shadow: none; padding: 0; max-width: 100%; }
            .no-print { display: none !important; }
            
            input, textarea { 
                border: none; background: transparent; padding: 0; 
                resize: none; overflow: hidden; box-shadow: none !important; color: black;
            }
            input::placeholder, textarea::placeholder { color: transparent; }
            .input-group label { min-width: auto; margin-right: 10px;}
            th, td { border: 1px solid black; }
            th { background-color: transparent !important; }
            
            tr { page-break-inside: avoid; break-inside: avoid; }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="loginScreen" class="login-screen no-print">
        <h2>Sistem Laporan BDR</h2>
        <p style="color: #64748b; margin-bottom: 30px;">Sila log masuk menggunakan emel rasmi anda.</p>
        <input type="email" id="userEmail" placeholder="emel@kkm.gov.my" required>
        <br>
        <button class="btn" onclick="login()">Log Masuk Semasa</button>
    </div>

    <div id="reportScreen" class="report-screen">
        <div class="control-panel no-print">
            <div style="display: flex; align-items: center;">
                <select id="historyDropdown" onchange="loadRecord()">
                    <option value="">-- Pilih Rekod Lepas --</option>
                </select>
                <button class="btn btn-danger" style="padding: 10px 15px;" onclick="padamRekod()">Padam</button>
            </div>
            <div>
                <button class="btn btn-warning" onclick="kosongkanBorang()">Kosongkan</button>
                <button class="btn btn-success" onclick="saveRecord()">Simpan Rekod</button>
                <button class="btn" onclick="printReport()">Cetak PDF</button>
            </div>
        </div>

        <div class="header-text">
            LAMPIRAN B<br>
            LAPORAN TUGAS MINGGUAN<br>
            BAGI PEGAWAI SEMASA TEMPOH BEKERJA DARI RUMAH<br>
            KEMENTERIAN KESIHATAN MALAYSIA
        </div>

        <div class="input-group">
            <label>MULAI:</label>
            <input type="text" id="mingguDate" placeholder="Cth: 21 April 2026 HINGGA 23 April 2026">
        </div>
        <div class="input-group">
            <label>BAHAGIAN:</label>
            <input type="text" id="bahagian" placeholder="Nama Bahagian">
        </div>
        <div class="input-group">
            <label>NAMA:</label>
            <input type="text" id="nama" placeholder="Nama Penuh Pegawai">
        </div>
        <div class="input-group">
            <label>JAWATAN & GRED:</label>
            <input type="text" id="jawatan" placeholder="Contoh: Personel MyStep / F41">
        </div>

        <table>
            <thead>
                <tr>
                    <th style="width: 5%; text-align: center;">BIL.</th>
                    <th style="width: 45%;">SENARAI TUGAS</th>
                    <th style="width: 50%;">OUTPUT</th>
                </tr>
            </thead>
            <tbody id="tbodyTugas">
                <tr>
                    <td class="row-number" style="text-align: center; padding-top: 15px;">1</td>
                    <td><textarea class="tugas-text" placeholder="Masukkan ringkasan tugas..."></textarea></td>
                    <td><textarea class="output-text" placeholder="Masukkan hasil / output tugas..."></textarea></td>
                </tr>
            </tbody>
        </table>
        
        <button class="btn btn-secondary no-print" onclick="tambahBaris()">+ Tambah Tugas Baru</button>

        <div class="signature-section">
            <p>DISAHKAN OLEH:</p>
            <br><br><br>
            <p>………………………………………………….<br>
            Setiausaha/Pengarah Bahagian</p>
        </div>
    </div>
</div>

<script>
    let bilCount = 1;

    function login() {
        const emailInput = document.getElementById('userEmail').value;
        if (emailInput.includes('@')) {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('reportScreen').style.display = 'block';
            updateDropdown();
        } else {
            Swal.fire({ icon: 'error', title: 'Akses Ditolak', text: 'Sila masukkan format emel yang sah (mesti mempunyai @).', confirmButtonColor: '#2563eb' });
        }
    }

    function tambahBaris(tugasValue = '', outputValue = '') {
        bilCount++;
        const tbody = document.getElementById('tbodyTugas');
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td class="row-number" style="text-align: center; padding-top: 15px;">${bilCount}</td>
            <td><textarea class="tugas-text" placeholder="Masukkan ringkasan tugas...">${tugasValue}</textarea></td>
            <td><textarea class="output-text" placeholder="Masukkan hasil / output tugas...">${outputValue}</textarea></td>
        `;
        tbody.appendChild(tr);
    }

    function saveRecord() {
        const dateKey = document.getElementById('mingguDate').value.trim();
        if (!dateKey) {
            Swal.fire({ icon: 'warning', title: 'Maklumat Tidak Lengkap', text: 'Sila isikan ruangan "MULAI" terlebih dahulu.', confirmButtonColor: '#f59e0b' });
            return;
        }

        const tugasanArray = [];
        const tugasanElements = document.getElementsByClassName('tugas-text');
        const outputElements = document.getElementsByClassName('output-text');
        
        for (let i = 0; i < tugasanElements.length; i++) {
            if(tugasanElements[i].value.trim() !== '' || outputElements[i].value.trim() !== '') {
                tugasanArray.push({ tugas: tugasanElements[i].value, output: outputElements[i].value });
            }
        }

        const reportData = { bahagian: document.getElementById('bahagian').value, nama: document.getElementById('nama').value, jawatan: document.getElementById('jawatan').value, tugasanList: tugasanArray };
        localStorage.setItem('BDR_' + dateKey, JSON.stringify(reportData));
        updateDropdown();
        document.getElementById('historyDropdown').value = dateKey;

        Swal.fire({ icon: 'success', title: 'Berjaya Disimpan!', text: `Rekod untuk '${dateKey}' telah disimpan.`, confirmButtonColor: '#10b981', timer: 2000, showConfirmButton: false });
    }

    function updateDropdown() {
        const dropdown = document.getElementById('historyDropdown');
        dropdown.innerHTML = '<option value="">-- Pilih Rekod Lepas --</option>';
        for (let i = 0; i < localStorage.length; i++) {
            const key = localStorage.key(i);
            if (key.startsWith('BDR_')) {
                const dateKey = key.replace('BDR_', '');
                const option = document.createElement('option');
                option.value = dateKey; option.text = dateKey;
                dropdown.appendChild(option);
            }
        }
    }

    function loadRecord() {
        const selectedDate = document.getElementById('historyDropdown').value;
        if (!selectedDate) return; 

        const savedData = JSON.parse(localStorage.getItem('BDR_' + selectedDate));
        if (savedData) {
            document.getElementById('mingguDate').value = selectedDate;
            document.getElementById('bahagian').value = savedData.bahagian || '';
            document.getElementById('nama').value = savedData.nama || '';
            document.getElementById('jawatan').value = savedData.jawatan || '';
            
            const tbody = document.getElementById('tbodyTugas');
            tbody.innerHTML = ''; bilCount = 0;

            if(savedData.tugasanList && savedData.tugasanList.length > 0) {
                savedData.tugasanList.forEach(item => { tambahBaris(item.tugas, item.output); });
            } else { tambahBaris(); }
        }
    }

    function padamRekod() {
        const selectedDate = document.getElementById('historyDropdown').value;
        if (!selectedDate) {
            Swal.fire({ icon: 'info', title: 'Pilih Rekod', text: "Sila pilih minggu terlebih dahulu.", confirmButtonColor: '#3085d6' });
            return;
        }

        Swal.fire({
            title: 'Adakah anda pasti?', text: `Data untuk minggu '${selectedDate}' akan dipadam.`, icon: 'warning',
            showCancelButton: true, confirmButtonColor: '#ef4444', cancelButtonColor: '#64748b', confirmButtonText: 'Ya, Padam', cancelButtonText: 'Batal'
        }).then((result) => {
            if (result.isConfirmed) {
                localStorage.removeItem('BDR_' + selectedDate);
                document.getElementById('mingguDate').value = '';
                const tbody = document.getElementById('tbodyTugas');
                tbody.innerHTML = ''; bilCount = 0; tambahBaris();
                updateDropdown();
                Swal.fire({ icon: 'success', title: 'Dipadam!', text: 'Rekod telah berjaya dipadam.', confirmButtonColor: '#10b981' });
            }
        });
    }

    function kosongkanBorang() {
        Swal.fire({
            title: 'Kosongkan Borang?', text: "Tarikh dan senarai tugas akan dikosongkan.", icon: 'question',
            showCancelButton: true, confirmButtonColor: '#f59e0b', cancelButtonColor: '#64748b', confirmButtonText: 'Ya', cancelButtonText: 'Batal'
        }).then((result) => {
            if (result.isConfirmed) {
                document.getElementById('mingguDate').value = ''; document.getElementById('historyDropdown').value = '';
                const tbody = document.getElementById('tbodyTugas');
                tbody.innerHTML = ''; bilCount = 0; tambahBaris();
            }
        });
    }

    function printReport() {
        const dateKey = document.getElementById('mingguDate').value.trim();
        const originalTitle = document.title;
        if(dateKey) {
            const safeName = dateKey.replace(/[^a-zA-Z0-9]/g, '_');
            document.title = "Laporan_BDR_" + safeName;
        } else {
            document.title = "Laporan_BDR_Mingguan";
        }
        window.print();
        document.title = originalTitle;
    }
</script>

</body>
</html>
