<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Laporan BDR</title>
    <style>
        /* Screen Styles */
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .login-screen {
            text-align: center;
            padding: 50px 20px;
        }
        .login-screen input {
            padding: 10px;
            width: 80%;
            max-width: 300px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .btn {
            padding: 10px 20px;
            background-color: #0366d6;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            margin: 5px;
        }
        .btn:hover { background-color: #024ea4; }
        .btn-success { background-color: #28a745; }
        .btn-success:hover { background-color: #218838; }
        .btn-secondary { background-color: #6c757d; padding: 5px 15px; margin-top: 10px;}
        .btn-secondary:hover { background-color: #5a6268; }
        
        .report-screen { display: none; }
        
        /* Control Panel */
        .control-panel {
            background-color: #e9ecef;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .control-panel select { padding: 8px; border-radius: 4px; }
        
        /* Form Inputs */
        .input-group { margin-bottom: 10px; display: flex; align-items: baseline;}
        .input-group label { font-weight: bold; margin-right: 10px; min-width: 150px; }
        .input-group input { flex-grow: 1; padding: 5px; border: 1px solid #ccc; font-family: inherit; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid black; padding: 10px; vertical-align: top; }
        th { background-color: #f0f0f0; }
        textarea { width: 100%; height: 120px; padding: 5px; border: 1px solid #ccc; font-family: inherit; resize: vertical; box-sizing: border-box;}
        
        .header-text { text-align: center; font-weight: bold; margin-bottom: 30px; line-height: 1.5;}
        .signature-section { margin-top: 50px; }

        /* Print Styles */
        @media print {
            body { background-color: white; padding: 0; }
            .container { box-shadow: none; padding: 0; max-width: 100%; }
            .no-print { display: none !important; }
            
            input, textarea { 
                border: none; 
                background: transparent; 
                padding: 0; 
                resize: none; 
                overflow: hidden;
            }
            input::placeholder, textarea::placeholder {
                color: transparent;
            }
            .input-group label { min-width: auto; margin-right: 5px;}
            th { background-color: transparent !important; }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Login Screen -->
    <div id="loginScreen" class="login-screen no-print">
        <h2>Log Masuk Sistem BDR</h2>
        <p>Sila masukkan emel anda untuk tujuan rekod.</p>
        <input type="email" id="userEmail" placeholder="emel@kkm.gov.my" required>
        <br>
        <button class="btn" onclick="login()">Log Masuk & Buka Borang</button>
    </div>

    <!-- Report Template Screen -->
    <div id="reportScreen" class="report-screen">
        
        <!-- Control Panel -->
        <div class="control-panel no-print">
            <div>
                <strong>Rekod Lepas:</strong>
                <select id="historyDropdown" onchange="loadRecord()">
                    <option value="">-- Pilih Minggu --</option>
                </select>
            </div>
            <div>
                <button class="btn btn-success" onclick="saveRecord()">Simpan Rekod</button>
                <button class="btn" onclick="printReport()">Cetak / Simpan PDF</button>
            </div>
        </div>

        <div class="header-text">
            LAMPIRAN B<br>
            LAPORAN TUGAS MINGGUAN<br>
            BAGI PEGAWAI SEMASA TEMPOH BEKERJA DARI RUMAH<br>
            KEMENTERIAN KESIHATAN MALAYSIA
        </div>

        <div class="input-group">
            <label>MULAI:</label>
            <input type="text" id="mingguDate" placeholder="Cth: 21 April 2026 HINGGA 23 April 2026">
        </div>
        <div class="input-group">
            <label>BAHAGIAN:</label>
            <input type="text" id="bahagian" placeholder="Nama Bahagian">
        </div>
        <div class="input-group">
            <label>NAMA:</label>
            <input type="text" id="nama" placeholder="Nama Penuh Pegawai">
        </div>
        <div class="input-group">
            <label>JAWATAN & GRED:</label>
            <input type="text" id="jawatan" placeholder="Contoh: Personel MyStep / F41">
        </div>

        <table>
            <thead>
                <tr>
                    <th style="width: 5%;">BIL.</th>
                    <th style="width: 45%;">SENARAI TUGAS</th>
                    <th style="width: 50%;">OUTPUT</th>
                </tr>
            </thead>
            <tbody id="tbodyTugas">
                <!-- Baris 1 (Default) -->
                <tr>
                    <td class="row-number" style="text-align: center;">1</td>
                    <td>
                        <textarea class="tugas-text" placeholder="Sila masukkan senarai tugas anda di sini..."></textarea>
                    </td>
                    <td>
                        <textarea class="output-text" placeholder="Sila masukkan output bagi tugas tersebut..."></textarea>
                    </td>
                </tr>
            </tbody>
        </table>
        
        <!-- Butang Tambah Baris (Akan hilang waktu print) -->
        <button class="btn btn-secondary no-print" onclick="tambahBaris()">+ Tambah Tugas</button>

        <div class="signature-section">
            <p>DISAHKAN OLEH:</p>
            <br><br>
            <p>………………………………………………….<br>
            Setiausaha/Pengarah Bahagian</p>
        </div>
    </div>
</div>

<script>
    let bilCount = 1;

    // 1. Handle Login
    function login() {
        const emailInput = document.getElementById('userEmail').value;
        if (emailInput.includes('@')) {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('reportScreen').style.display = 'block';
            updateDropdown();
        } else {
            alert('Sila masukkan emel yang sah.');
        }
    }

    // 2. Fungsi Tambah Baris Baharu
    function tambahBaris(tugasValue = '', outputValue = '') {
        bilCount++;
        const tbody = document.getElementById('tbodyTugas');
        const tr = document.createElement('tr');
        
        tr.innerHTML = `
            <td class="row-number" style="text-align: center;">${bilCount}</td>
            <td>
                <textarea class="tugas-text" placeholder="Sila masukkan senarai tugas anda di sini...">${tugasValue}</textarea>
            </td>
            <td>
                <textarea class="output-text" placeholder="Sila masukkan output bagi tugas tersebut...">${outputValue}</textarea>
            </td>
        `;
        tbody.appendChild(tr);
    }

    // 3. Simpan Rekod (Menyokong Berbilang Baris)
    function saveRecord() {
        const dateKey = document.getElementById('mingguDate').value.trim();
        if (!dateKey) {
            alert("Sila isikan ruangan 'MULAI' terlebih dahulu sebagai rujukan minggu.");
            return;
        }

        // Kumpul semua tugasan dari table
        const tugasanArray = [];
        const tugasanElements = document.getElementsByClassName('tugas-text');
        const outputElements = document.getElementsByClassName('output-text');
        
        for (let i = 0; i < tugasanElements.length; i++) {
            tugasanArray.push({
                tugas: tugasanElements[i].value,
                output: outputElements[i].value
            });
        }

        const reportData = {
            bahagian: document.getElementById('bahagian').value,
            nama: document.getElementById('nama').value,
            jawatan: document.getElementById('jawatan').value,
            tugasanList: tugasanArray
        };

        localStorage.setItem('BDR_' + dateKey, JSON.stringify(reportData));
        alert("Rekod untuk minggu '" + dateKey + "' berjaya disimpan!");
        updateDropdown();
        document.getElementById('historyDropdown').value = dateKey;
    }

    // 4. Update Dropdown Rekod Lama
    function updateDropdown() {
        const dropdown = document.getElementById('historyDropdown');
        dropdown.innerHTML = '<option value="">-- Pilih Minggu --</option>';
        
        for (let i = 0; i < localStorage.length; i++) {
            const key = localStorage.key(i);
            if (key.startsWith('BDR_')) {
                const dateKey = key.replace('BDR_', '');
                const option = document.createElement('option');
                option.value = dateKey;
                option.text = dateKey;
                dropdown.appendChild(option);
            }
        }
    }

    // 5. Load Rekod (Memaparkan Semula Semua Baris Yang Disimpan)
    function loadRecord() {
        const selectedDate = document.getElementById('historyDropdown').value;
        if (!selectedDate) return; 

        const savedData = JSON.parse(localStorage.getItem('BDR_' + selectedDate));
        if (savedData) {
            document.getElementById('mingguDate').value = selectedDate;
            document.getElementById('bahagian').value = savedData.bahagian || '';
            document.getElementById('nama').value = savedData.nama || '';
            document.getElementById('jawatan').value = savedData.jawatan || '';
            
            // Kosongkan table terlebih dahulu
            const tbody = document.getElementById('tbodyTugas');
            tbody.innerHTML = '';
            bilCount = 0;

            // Masukkan semula baris berdasarkan data yang disimpan
            if(savedData.tugasanList && savedData.tugasanList.length > 0) {
                savedData.tugasanList.forEach(item => {
                    tambahBaris(item.tugas, item.output);
                });
            } else {
                // Jika tiada tugasan (fallback), wujudkan sekurang-kurangnya 1 baris
                tambahBaris(); 
            }
        }
    }

    // 6. Fungsi Cetak
    function printReport() {
        const dateKey = document.getElementById('mingguDate').value.trim();
        const originalTitle = document.title;
        
        if(dateKey) {
            const safeName = dateKey.replace(/[^a-zA-Z0-9]/g, '_');
            document.title = "Laporan_BDR_" + safeName;
        } else {
            document.title = "Laporan_BDR_Mingguan";
        }
        
        window.print();
        document.title = originalTitle;
    }
</script>

</body>
</html>
